<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Custom Language Editor</title>
  <style>
    body { margin: 0; font-family: monospace; background: #1e1e1e; color: #fff; }
    #container { display: flex; flex-direction: column; height: 100vh; }
    #editor { height: 60%; }
    #controls { padding: 10px; background: #111; }
    button { padding: 8px 12px; margin-right: 10px; }
    #output { height: 40%; background: #000; color: #0f0; padding: 10px; overflow: auto; white-space: pre-wrap; }
  </style>
</head>
<body>

<div id="container">
  <div id="editor"></div>
  <div id="controls">
    <button onclick="runCode()">Run</button>
  </div>
  <pre id="output"></pre>
</div>

<!-- Monaco Editor Loader -->
<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
let editor;

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('editor'), {
    value: "",
    language: 'plaintext',
    theme: 'vs-dark',
    automaticLayout: true
  });

  // Simple validation for squiggly errors
  editor.onDidChangeModelContent(validate);
});

function tokenize(input) {
  return input.split(/\s+/).filter(t => t.length > 0);
}

function countArrows(token) {
  let count = 0;
  for (let c of token) {
    if (c === '>') count++;
    else break;
  }
  return count;
}

function validate() {
  const value = editor.getValue();
  const tokens = tokenize(value);
  let markers = [];

  tokens.forEach((token, index) => {
    if (!token.startsWith('>') && token.length > 0) {
      markers.push({
        startLineNumber: 1,
        startColumn: 1,
        endLineNumber: 1,
        endColumn: 2,
        message: 'Invalid token',
        severity: monaco.MarkerSeverity.Error
      });
    }
  });

  monaco.editor.setModelMarkers(editor.getModel(), 'owner', markers);
}

function parsePrint(symbols) {
  if (symbols === ".") return "a";
  if (symbols === "..") return "A";
  if (symbols === "...") return "1";
  if (symbols === "....") return "@";
  return "?";
}

function runCode() {
  const input = editor.getValue();
  const tokens = tokenize(input);

  let variables = {};
  let output = "";

  function getVar(i) {
    return variables[i] || 0;
  }

  function setVar(i, v) {
    variables[i] = v;
  }

  for (let token of tokens) {
    if (token.includes("-=>")) {
      let parts = token.split("-=>");
      let arrows = countArrows(parts[0]);
      let valueToken = parts[1];
      let value = valueToken.includes(".") ? valueToken.length : parseInt(valueToken) || 0;
      setVar(arrows, value);
    }
    else if (token.includes("->") && !token.includes("-=>")) {
      let arrows = countArrows(token.split("->")[0]);
      output += getVar(arrows);
    }
    else if (token.startsWith(">")) {
      let dots = token.slice(1);
      output += parsePrint(dots);
    }
  }

  document.getElementById("output").textContent = output;
}
</script>

</body>
</html>
