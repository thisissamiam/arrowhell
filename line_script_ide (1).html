<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title><<<>><><<<>>> IDE</title>
<style>
body{
margin:0;
background:#0f0f0f;
color:#e0e0e0;
font-family:monospace;
overflow:hidden;
}
#topbar{
height:40px;
background:#111;
display:flex;
align-items:center;
padding:0 10px;
gap:10px;
}
button{
background:#222;
color:#eee;
border:none;
padding:6px 10px;
cursor:pointer;
}
button:hover{background:#333;}
#layout{
display:flex;
height:calc(100vh - 40px);
}
#editor{
width:50%;
height:100%;
background:#0a0a0a;
color:#00ffcc;
border:none;
outline:none;
padding:10px;
resize:none;
font-size:14px;
}
#output{
width:50%;
height:100%;
border:none;
background:#ffffff;
}
#status{
position:absolute;
bottom:5px;
left:10px;
font-size:10px;
opacity:0.5;
}
</style>
</head>
<body>
<div id="topbar">
<button onclick="runCode()">><>< Run</button>
<button onclick="clearAll()"><< Clear</button>
</div>
<div id="layout">
<textarea id="editor" spellcheck="false">
>>>-=> >>>>.. 
[ >>>-+ >>>... ]
</textarea>
<iframe id="output"></iframe>
</div>
<div id="status"><<<>>< status: ready ></div>
<script>
function decodeNumber(token){
  let count = (token.match(/>/g) || []).length;
  let dots = (token.match(/\./g) || []).length;
  if(dots === 3) return count % 10;
  if(dots === 1) return ((count - 1) % 26) + 97;
  if(dots === 2) return ((count - 1) % 26) + 65;
  return 0;
}

function runCode(){
  const code = document.getElementById('editor').value.trim();
  const tokens = code.split(/\s+/);

  let memory = new Array(100).fill(0);
  let currentVar = 0;
  let output = "";

  let i = 0;

  while(i < tokens.length){
    let token = tokens[i];

    // Loop start
    if(token === '['){
      let loopStart = i + 1;
      let depth = 1;
      let j = loopStart;

      while(j < tokens.length && depth > 0){
        if(tokens[j] === '[') depth++;
        if(tokens[j] === ']') depth--;
        j++;
      }

      let loopEnd = j - 1;

      while(memory[currentVar] > 0){
        for(let k = loopStart; k < loopEnd; k++){
          processToken(tokens[k]);
        }
      }

      i = loopEnd;
    }
    else if(token === ']'){
      // handled in [
    }
    else{
      processToken(token);
    }

    i++;
  }

  function processToken(token){
    if(token.includes('-')){
      let varIndex = (token.match(/>/g) || []).length;
      currentVar = varIndex;
      return;
    }

    if(token.includes('+') || token.includes('-') || token.includes('*') || token.includes('/')){
      let op = token[token.length-1];
      let nextToken = tokens[tokens.indexOf(token)+1] || "";
      let value = decodeNumber(nextToken);

      if(op === '+') memory[currentVar] += value;
      if(op === '-') memory[currentVar] -= value;
      if(op === '*') memory[currentVar] *= value;
      if(op === '/') memory[currentVar] = Math.floor(memory[currentVar] / (value || 1));
      if(op === '=') memory[currentVar] = value;
      return;
    }

    // output decoding
    if(/^[>.]+$/.test(token)){
      let count = (token.match(/>/g) || []).length;
      let dots = (token.match(/\./g) || []).length;

      if(dots === 1){
        output += String.fromCharCode(((count - 1) % 26) + 97);
      }
      else if(dots === 2){
        output += String.fromCharCode(((count - 1) % 26) + 65);
      }
      else if(dots === 3){
        output += (count % 10).toString();
      }
    }
  }

  document.getElementById('output').srcdoc = "<pre>" + output + "</pre>";
  document.getElementById('status').innerText = '<<<> executed >>';
}

function clearAll(){
  document.getElementById('editor').value = '';
  document.getElementById('output').srcdoc = '';
  document.getElementById('status').innerText = '<< cleared >>';
}
</script>
</body>
</html>
