<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Custom Language Editor (Real Parser)</title>
  <style>
    body { margin: 0; font-family: monospace; background: #1e1e1e; color: #fff; }
    #container { display: flex; flex-direction: column; height: 100vh; }
    #editor { height: 60%; }
    #controls { padding: 10px; background: #111; }
    button { padding: 8px 12px; margin-right: 10px; }
    #output { height: 40%; background: #000; color: #0f0; padding: 10px; overflow: auto; white-space: pre-wrap; }
  </style>
</head>
<body>

<div id="container">
  <div id="editor"></div>
  <div id="controls">
    <button onclick="runCode()">Run</button>
  </div>
  <pre id="output"></pre>
</div>

<script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
let editor;

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.44.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  editor = monaco.editor.create(document.getElementById('editor'), {
    value: "",
    language: 'plaintext',
    theme: 'vs-dark',
    automaticLayout: true
  });
});

// ===== REAL PARSER =====

function tokenize(input) {
  let tokens = [];
  let i = 0;

  while (i < input.length) {
    if (input[i] === '>') {
      let start = i;
      while (i < input.length && input[i] === '>') i++;
      let arrows = input.slice(start, i);

      let rest = '';
      while (i < input.length && input[i] !== ' ' && input[i] !== '\n') {
        rest += input[i++];
      }

      tokens.push(arrows + rest);
    } else if (input[i] === '[') {
      let start = i;
      let depth = 1;
      i++;
      while (i < input.length && depth > 0) {
        if (input[i] === '[') depth++;
        if (input[i] === ']') depth--;
        i++;
      }
      tokens.push(input.slice(start, i));
    } else {
      i++;
    }
  }

  return tokens;
}

function countArrows(str) {
  let i = 0;
  while (i < str.length && str[i] === '>') i++;
  return i;
}

function parseBlock(block) {
  let statements = [];
  let tokens = tokenize(block);

  for (let token of tokens) {
    statements.push(parseStatement(token));
  }

  return statements;
}

function parseStatement(token) {
  // Loop
  if (token.includes('[')) {
    let arrows = countArrows(token);
    let inner = token.slice(token.indexOf('[') + 1, token.lastIndexOf(']'));
    return {
      type: 'loop',
      count: arrows,
      body: parseBlock(inner)
    };
  }

  // Variable assignment
  if (token.includes('-=>')) {
    let [left, right] = token.split('-=>');
    return {
      type: 'assign',
      varIndex: countArrows(left),
      valueToken: right
    };
  }

  // Variable print
  if (token.includes('->')) {
    return {
      type: 'varPrint',
      varIndex: countArrows(token.split('->')[0])
    };
  }

  // Print
  if (token.startsWith('>')) {
    return {
      type: 'print',
      dots: token.slice(1)
    };
  }

  return { type: 'noop' };
}

function execute(ast, variables, outputObj) {

  function parseValue(token) {
    if (token.includes('.')) return token.length;
    return parseInt(token) || 0;
  }

  for (let node of ast) {

    if (node.type === 'print') {
      let d = node.dots;
      if (d === '.') outputObj.value += 'a';
      else if (d === '..') outputObj.value += 'A';
      else if (d === '...') outputObj.value += '1';
      else if (d === '....') outputObj.value += '@';
      else outputObj.value += '?';
    }

    else if (node.type === 'assign') {
      variables[node.varIndex] = parseValue(node.valueToken);
    }

    else if (node.type === 'varPrint') {
      outputObj.value += (variables[node.varIndex] || 0);
    }

    else if (node.type === 'loop') {
      for (let i = 0; i < node.count; i++) {
        execute(node.body, variables, outputObj);
      }
    }
  }
}

function runCode() {
  const input = editor.getValue();

  let ast = parseBlock(input);
  let variables = {};
  let outputObj = { value: '' };

  execute(ast, variables, outputObj);

  document.getElementById('output').textContent = outputObj.value;
}

</script>

</body>
</html>
