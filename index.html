<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Custom Editor</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #1e1e1e;
  color: white;
  font-family: monospace;
}

.editor-wrapper {
  display: flex;
  height: 100%;
}

.gutter {
  width: 50px;
  padding: 10px 5px;
  text-align: right;
  background: #252526;
  color: #666;
  user-select: none;
}

.editor {
  position: relative;
  flex: 1;
}

textarea, .highlight {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 10px;
  font-size: 14px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-wrap: break-word;
  border: none;
  outline: none;
  box-sizing: border-box;
}

textarea {
  background: transparent;
  color: transparent;
  caret-color: white;
  z-index: 2;
  resize: none;
}

.highlight {
  color: #d4d4d4;
  z-index: 1;
  pointer-events: none;
}

.keyword { color: #4fc1ff; font-weight: bold; }
.arrow { color: #c586c0; font-weight: bold; }
.error {
  text-decoration: underline;
  text-decoration-style: wavy;
  text-decoration-color: red;
}

#cursor {
  position: absolute;
  width: 2px;
  height: 18px;
  background: white;
  animation: blink 1s step-end infinite;
  pointer-events: none;
  z-index: 3;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>
<body>

<div class="editor-wrapper">
  <div class="gutter" id="gutter"></div>
  <div class="editor">
    <div id="highlight" class="highlight"></div>
    <div id="cursor"></div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
</div>

<script>
const editor = document.getElementById("editor");
const highlight = document.getElementById("highlight");
const gutter = document.getElementById("gutter");
const cursor = document.getElementById("cursor");

// ---------------- TOKENIZER ----------------
function tokenize(code) {
  const tokens = [];
  let current = "";

  const pushToken = (type, value) => {
    if (value) tokens.push({ type, value });
  };

  const isOperator = (str) => /^(>-=|>->|>>>\.\.\.)$/.test(str);

  const words = code.split(/(\s+)/);

  words.forEach(word => {
    if (word.trim() === "") {
      tokens.push({ type: "space", value: word });
    } else if (isOperator(word)) {
      tokens.push({ type: "keyword", value: word });
    } else if (word === "[" || word === "]") {
      tokens.push({ type: "arrow", value: word });
    } else if (/^[a-zA-Z0-9_]+$/.test(word)) {
      tokens.push({ type: "identifier", value: word });
    } else {
      tokens.push({ type: "error", value: word });
    }
  });

  return tokens;
}

// ---------------- HIGHLIGHT ----------------
function highlightCode(code) {
  const tokens = tokenize(code);
  let html = "";

  tokens.forEach(t => {
    if (t.type === "space") {
      html += t.value;
    } else if (t.type === "keyword") {
      html += `<span class="keyword">${t.value}</span>`;
    } else if (t.type === "arrow") {
      html += `<span class="arrow">${t.value}</span>`;
    } else if (t.type === "error") {
      html += `<span class="error">${t.value}</span>`;
    } else {
      html += t.value;
    }
  });

  return html;
}

// ---------------- LINE NUMBERS ----------------
function updateLineNumbers(textarea, gutter) {
  const lines = textarea.value.split("\n");
  let html = "";
  let count = 1;

  lines.forEach(line => {
    const wrapped = Math.max(1, Math.ceil(line.length / 80));
    for (let i = 0; i < wrapped; i++) {
      html += count + "<br>";
      count++;
    }
  });

  gutter.innerHTML = html;
}

// ---------------- CURSOR POSITION ----------------
function updateCursor() {
  const style = getComputedStyle(editor);
  const lineHeight = parseFloat(style.lineHeight);
  const charWidth = 8;

  const pos = editor.selectionStart;
  const textBefore = editor.value.substring(0, pos);
  const lines = textBefore.split("\n");

  const top = (lines.length - 1) * lineHeight;
  const left = lines[lines.length - 1].length * charWidth;

  cursor.style.top = top + "px";
  cursor.style.left = left + "px";
}

// ---------------- UPDATE ----------------
function update() {
  highlight.innerHTML = highlightCode(editor.value);
  updateLineNumbers(editor, gutter);
  updateCursor();
}

editor.addEventListener("input", update);
editor.addEventListener("scroll", () => {
  highlight.scrollTop = editor.scrollTop;
  gutter.scrollTop = editor.scrollTop;
});
editor.addEventListener("keyup", updateCursor);
editor.addEventListener("click", updateCursor);

update();
</script>

</body>
</html>
